<script>
  const flutterBridge = new FlutterJSBridge();
  const cache = new Cache();
  const http = new Http();
  const cookie = new Cookie();

  // 基础网址，不要以斜杠结尾
  var baseurl = "https://www.alicesw.com";
  var header = {
    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  };

  function getFormattedUrl(path) {
    if (!path) return "";
    if (path.startsWith('http')) {
      return path;
    }
    var formattedBaseUrl = baseurl.replace(/\/+$/, ''); // 移除 baseurl 末尾的斜杠
    var formattedPath = path.replace(/^\/+/, ''); // 移除 path 开头的斜杠
    return `${formattedBaseUrl}/${formattedPath}`;
  }

  // 搜索函数
  async function search(keyword, page) {
    try {
      var searchUrl = getFormattedUrl(`/search.html?q=${encodeURIComponent(keyword)}&f=_all&p=${page}`);
      var get = await http.Get(searchUrl, JSON.stringify(header), true);

      flutterBridge.text(0, get.data);

      var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));
      var books = [];

      var $bookItems = $tempContainer.find(".list-group-item");

      $bookItems.each(function () {
        var $item = $(this);
        var $titleLink = $item.find("h5 a").first();
        if ($titleLink.length === 0) return;

        var name = $titleLink.text().trim().replace(/^\d+\.\s*/, '');
        var bookUrl = getFormattedUrl($titleLink.attr('href'));

        if (!name || !bookUrl) return;

        var author = "";
        var $authorLink = $item.find("a[href*='f=author']").first();
        if ($authorLink.length > 0) {
          author = $authorLink.text().trim();
        }

        var intro = $item.find(".content-txt").first().text().trim() || "";

        var tocUrl = "";
        var bookIdMatch = bookUrl.match(/\/novel\/(\d+)\.html/);
        if (bookIdMatch) {
          tocUrl = getFormattedUrl(`/other/chapters/id/${bookIdMatch[1]}.html`);
        }

        books.push({
          "bookUrl": bookUrl,
          "name": name,
          "author": author,
          "kind": "",
          "coverUrl": "",
          "intro": intro,
          "tocUrl": tocUrl || bookUrl,
          "wordCount": "",
          "type": 0,
          "latestChapterTitle": ""
        });
      });

      removeHTMLSafely($tempContainer);
      return JSON.stringify(books);
    } catch (e) {
      flutterBridge.log("搜索错误: " + e.message);
      return "[]";
    }
  }

  // 书籍详情函数
  async function info(bookurl) {
    try {
      var get = await http.Get(bookurl, JSON.stringify(header), true);
      flutterBridge.text(1, get.data);

      var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));

      var name = "";
      var $title = $tempContainer.find(".novel_title").first();
      if ($title.length > 0) {
        name = $title.text().trim();
      }

      var author = "";
      var $authorLink = $tempContainer.find(".novel_info a[href*='f=author']").first();
      if ($authorLink.length > 0) {
        author = $authorLink.text().trim();
      }

      var coverUrl = "";
      var $cover = $tempContainer.find(".box_intro img.lazyload_book_cover").first();
      if ($cover.length > 0) {
        var src = $cover.attr('src') || $cover.attr('data-src');
        coverUrl = getFormattedUrl(src);
      }

      var kind = "";
      var $category = $tempContainer.find(".novel_info a[href*='/lists/']").first();
      if ($category.length > 0) {
        kind = $category.text().trim();
      }

      var intro = "";
      var $intro = $tempContainer.find(".jianjie p").first();
      if ($intro.length > 0) {
        intro = $intro.text().trim();
      }

      var tocUrl = "";
      var $tocLink = $tempContainer.find("a[href*='/other/chapters/id/']").first();
      if ($tocLink.length > 0) {
        tocUrl = getFormattedUrl($tocLink.attr('href'));
      }

      if (!tocUrl && bookurl) {
        var match = bookurl.match(/\/novel\/(\d+)\.html/);
        if (match) {
          tocUrl = getFormattedUrl(`/other/chapters/id/${match[1]}.html`);
        }
      }

      var book = {
        "bookUrl": bookurl,
        "name": name,
        "author": author,
        "kind": kind,
        "coverUrl": coverUrl,
        "intro": intro,
        "tocUrl": tocUrl || bookurl,
        "wordCount": "",
        "type": 0,
        "latestChapterTitle": ""
      };

      removeHTMLSafely($tempContainer);
      return JSON.stringify(book);
    } catch (e) {
      return "{}";
    }
  }

  // 目录列表函数
  async function chapter(tocurl) {
    try {
      var get = await http.Get(tocurl, JSON.stringify(header), true);
      flutterBridge.text(2, get.data);

      var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));
      var chapters = [];

      // 使用更具体的选择器
      var $chapterLinks = $tempContainer.find(".mulu_list a[href^='/book/']");

      $chapterLinks.each(function (index) {
        var $link = $(this);
        var chapterTitle = $link.text().trim();
        var chapterUrl = getFormattedUrl($link.attr('href'));

        if (!chapterTitle || !chapterUrl) return;

        chapters.push({
          "name": chapterTitle,
          "chapterId": chapterUrl,
          "index": chapters.length,
          "isPay": false,
          "isVip": false,
          "isVolume": false,
          "tag": ""
        });
      });

      removeHTMLSafely($tempContainer);
      return JSON.stringify(chapters);
    } catch (e) {
      flutterBridge.log("目录解析错误: " + e.message);
      return "[]";
    }
  }

  // 章节内容函数
  async function content(url) {
    try {
      var get = await http.Get(url, JSON.stringify(header), true);
      flutterBridge.text(3, get.data);

      var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));

      var result = "";
      var $content = $tempContainer.find("div.read-content, .j_readContent, .user_ad_content").first();

      if ($content.length > 0) {
        var html = $content.html();
        html = html.replace(/<br\s*\/?>/gi, "\r\n");
        html = html.replace(/<\/p>/gi, "\r\n\r\n");
        html = html.replace(/<[^>]+>/g, "");
        var $temp = $('<div>').html(html);
        result = $temp.text();
        result = result.trim();
      }

      removeHTMLSafely($tempContainer);
      return result;
    } catch (e) {
      return "";
    }
  }

  // 发现页书籍列表函数
  async function find(url, page) {
    try {
      // APP传入的URL包含{{page}}占位符,需要替换为实际页码
      if (url.includes('{{page}}')) {
        url = url.replace('{{page}}', page);
      }

      var get = await http.Get(url, JSON.stringify(header), true);
      var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));
      var books = [];

      // 发现页使用ul/li结构,不是table
      var $rows = $tempContainer.find(".rec_rullist ul");

      $rows.each(function () {
        var $row = $(this);

        // li.two 包含书名和链接
        var $titleLink = $row.find("li.two a").first();
        if ($titleLink.length === 0) return;

        var name = $titleLink.text().trim();
        var bookUrl = $titleLink.attr('href');

        if (!name || !bookUrl) return;
        if (!bookUrl.startsWith('http')) {
          bookUrl = baseurl + bookUrl;
        }

        // li.four 包含作者
        var author = $row.find("li.four").text().trim();

        // li.sev 包含分类
        var kind = $row.find("li.sev").text().trim();

        // li.three 包含最新章节
        var latestChapter = $row.find("li.three").text().trim();

        books.push({
          "bookUrl": bookUrl,
          "name": name,
          "author": author,
          "kind": kind,
          "coverUrl": "",
          "intro": "",
          "tocUrl": bookUrl,
          "wordCount": "",
          "type": 0,
          "latestChapterTitle": latestChapter
        });
      });

      removeHTMLSafely($tempContainer);
      return JSON.stringify(books);
    } catch (e) {
      return "[]";
    }
  }

  // 登录相关函数
  async function getloginurl() {
    var loginUrl = getFormattedUrl("/user/user/login.html");
    try {
      // 检查 Cookie,有 Cookie 返回首页,无 Cookie 返回登录页
      var cookies = await cookie.get(baseurl);

      if (cookies && cookies.length > 50) {
        return baseurl; // 已登录,返回首页
      }

      return loginUrl;  // 未登录,返回登录页
    } catch (e) {
      return loginUrl;
    }
  }

  async function login() {
    // webview登录完成后调用,验证登录状态
    try {
      var homeGet = await http.Get(baseurl, JSON.stringify(header), true);

      // 检查页面中是否包含登录成功的标志
      if (homeGet.data.includes("退出登录") ||
        homeGet.data.includes("个人中心") ||
        homeGet.data.includes("user/user/logout")) {

        // 登录成功,保存到缓存
        await cache.set("alicesw_login_status", "true");
        await cache.set("alicesw_login_time", Date.now().toString());

        return true;
      }

      return false;
    } catch (e) {
      return false;
    }
  }

  async function checklogin() {
    try {
      // 优先检查缓存
      var loginStatus = await cache.get("alicesw_login_status");
      if (loginStatus === "true") {
        return true;
      }

      // 检查 Cookie
      var cookies = await cookie.get(baseurl);
      if (cookies && cookies.length > 50) {
        // 有 Cookie,保存到缓存
        await cache.set("alicesw_login_status", "true");
        await cache.set("alicesw_login_time", Date.now().toString());
        return true;
      }

      return false;
    } catch (e) {
      return false;
    }
  }

  window.search = search;
  window.info = info;
  window.chapter = chapter;
  window.content = content;
  window.getfinds = getfinds;
  window.find = find;
  window.getloginurl = getloginurl;
  window.login = login;
  window.checklogin = checklogin;
  async function gethelp() {
    return "oevery: https://github.com/oevery/qysg";
  }
</script>
