<script>
    var isCookieJar = true;

    class FlutterJSBridge {
        constructor() {
            this.init();
        }

        init() {
            if (window.flutter_inappwebview) {
                this.isReady = true;
                this.CookieJar();
            } else {
                window.addEventListener('flutterInAppWebViewPlatformReady', () => {
                    this.isReady = true;
                    this.CookieJar();
                });
            }
        }

        async CookieJar() {
            try {
                await window.flutter_inappwebview.callHandler('CookieJar', isCookieJar);
            } catch (error) { }
        }

        async log(str) {
            try {
                return await window.flutter_inappwebview.callHandler('log', str);
            } catch (error) {
                return false;
            }
        }

        async text(type, str) {
            try {
                return await window.flutter_inappwebview.callHandler('text', type, str);
            } catch (error) {
                return false;
            }
        }

        async webview(url, js, html, body, header) {
            try {
                return await window.flutter_inappwebview.callHandler('webview', url, js, html, body, header, "", "");
            } catch (error) {
                return "";
            }
        }

        async openurl(url) {
            try {
                return await window.flutter_inappwebview.callHandler('openurl', url, "");
            } catch (error) {
                return false;
            }
        }
    }

    class Http {
        constructor() { }

        async Get(url, headers, followRedirects) {
            try {
                return await window.flutter_inappwebview.callHandler('http', "get", url, "", headers, followRedirects, "");
            } catch (error) {
                return null;
            }
        }

        async Post(url, headers, body, contenttype, followRedirects) {
            try {
                return await window.flutter_inappwebview.callHandler('http', "post", url, body, headers, followRedirects, contenttype);
            } catch (error) {
                return null;
            }
        }
    }

    class Cache {
        constructor() { }

        async get(key) {
            try {
                return await window.flutter_inappwebview.callHandler('cache.get', key);
            } catch (error) {
                return null;
            }
        }

        async set(key, value) {
            try {
                return await window.flutter_inappwebview.callHandler('cache.set', key, value);
            } catch (error) {
                return null;
            }
        }
    }

    class Cookie {
        constructor() { }

        async get(url) {
            try {
                return await window.flutter_inappwebview.callHandler('cookie.get', url);
            } catch (error) {
                return null;
            }
        }

        async set(url, value) {
            try {
                return await window.flutter_inappwebview.callHandler('cookie.set', url, value);
            } catch (error) {
                return null;
            }
        }
    }

    function parseHTMLSafely(htmlStr) {
        try {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlStr;
            return $(tempDiv);
        } catch (e) {
            return $('<div>');
        }
    }

    function removeHTMLSafely(tempContainer) {
        try {
            if (tempContainer && tempContainer[0]) {
                tempContainer.remove();
            }
        } catch (e) { }
    }

    function removeHTMLTags(htmlString) {
        let result = htmlString.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
        result = result.replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '');
        return result;
    }

    const flutterBridge = new FlutterJSBridge();
    const cache = new Cache();

    // 搜索函数
    async function search(keyword, page) {
        try {
            var searchUrl = baseurl + "/search.html?q=" + encodeURIComponent(keyword);
            var get = await http.Get(searchUrl, JSON.stringify(header), true);

            flutterBridge.text(0, get.data);

            var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));
            var books = [];

            var $bookItems = $tempContainer.find(".list-group-item");

            $bookItems.each(function () {
                var $item = $(this);
                var $titleLink = $item.find("h5 a").first();
                if ($titleLink.length === 0) return;

                var name = $titleLink.text().trim().replace(/^\d+\.\s*/, '');
                var bookUrl = $titleLink.attr('href');

                if (!name || !bookUrl) return;
                if (!bookUrl.startsWith('http')) {
                    bookUrl = baseurl + bookUrl;
                }

                var author = "";
                var $authorLink = $item.find("a[href*='f=author']").first();
                if ($authorLink.length > 0) {
                    author = $authorLink.text().trim();
                }

                books.push({
                    "bookUrl": bookUrl,
                    "name": name,
                    "author": author,
                    "kind": "",
                    "coverUrl": "",
                    "intro": "",
                    "tocUrl": bookUrl,
                    "wordCount": "",
                    "type": 0,
                    "latestChapterTitle": ""
                });
            });

            removeHTMLSafely($tempContainer);
            return JSON.stringify(books);
        } catch (e) {
            flutterBridge.log("搜索错误: " + e.message);
            return "[]";
        }
    }

    // 书籍详情函数
    async function info(bookurl) {
        try {
            var get = await http.Get(bookurl, JSON.stringify(header), true);
            flutterBridge.text(1, get.data);

            var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));

            var name = "";
            var $title = $tempContainer.find("h1, .novel-title").first();
            if ($title.length > 0) {
                name = $title.text().trim();
            }

            var author = "";
            var $authorLink = $tempContainer.find("a[href*='f=author']").first();
            if ($authorLink.length > 0) {
                author = $authorLink.text().trim();
            }

            var coverUrl = "";
            var $cover = $tempContainer.find("img.lazyload_book_cover, .novel-img img").first();
            if ($cover.length > 0) {
                var src = $cover.attr('src') || $cover.attr('data-src');
                if (src) {
                    coverUrl = src.startsWith('http') ? src : baseurl + src;
                }
            }

            var kind = "";
            var $category = $tempContainer.find("a[href*='/lists/']").first();
            if ($category.length > 0) {
                kind = "分类:" + $category.text().trim();
            }

            var intro = "";
            var $intro = $tempContainer.find(".novel-introduction, .intro").first();
            if ($intro.length > 0) {
                intro = $intro.text().trim();
            }

            var tocUrl = "";
            var $tocLink = $tempContainer.find("a[href*='/other/chapters/id/']").first();
            if ($tocLink.length > 0) {
                tocUrl = $tocLink.attr('href');
                if (tocUrl && !tocUrl.startsWith('http')) {
                    tocUrl = baseurl + tocUrl;
                }
            }

            if (!tocUrl && bookurl) {
                var match = bookurl.match(/\/novel\/(\d+)\.html/);
                if (match) {
                    tocUrl = baseurl + "/other/chapters/id/" + match[1] + ".html";
                }
            }

            var book = {
                "bookUrl": bookurl,
                "name": name,
                "author": author,
                "kind": kind,
                "coverUrl": coverUrl,
                "intro": intro,
                "tocUrl": tocUrl || bookurl,
                "wordCount": "",
                "type": 0,
                "latestChapterTitle": ""
            };

            removeHTMLSafely($tempContainer);
            return JSON.stringify(book);
        } catch (e) {
            return "{}";
        }
    }

    // 目录列表函数
    async function toc(tocurl) {
        try {
            var get = await http.Get(tocurl, JSON.stringify(header), true);
            flutterBridge.text(2, get.data);

            var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));
            var chapters = [];

            // 使用更具体的选择器
            var $chapterLinks = $tempContainer.find(".mulu_list a[href^='/book/']");

            $chapterLinks.each(function () {
                var $link = $(this);
                var chapterTitle = $link.text().trim();
                var chapterUrl = $link.attr('href');

                if (!chapterTitle || !chapterUrl) return;
                if (!chapterUrl.startsWith('http')) {
                    chapterUrl = baseurl + chapterUrl;
                }

                chapters.push({
                    "name": chapterTitle,
                    "chapterId": chapterUrl,
                    "index": chapters.length,
                    "isVolume": false,
                    "isPaid": false,
                    "isVip": false,
                    "tag": ""
                });
            });

            removeHTMLSafely($tempContainer);
            return JSON.stringify(chapters);
        } catch (e) {
            flutterBridge.log("目录解析错误: " + e.message);
            return "[]";
        }
    }

    // 章节内容函数
    async function content(url) {
        try {
            var get = await http.Get(url, JSON.stringify(header), true);
            flutterBridge.text(3, get.data);

            var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));

            var result = "";
            var $content = $tempContainer.find("div.read-content, .j_readContent, .user_ad_content").first();

            if ($content.length > 0) {
                var html = $content.html();
                html = html.replace(/<br\s*\/?>/gi, "\r\n");
                html = html.replace(/<\/p>/gi, "\r\n\r\n");
                html = html.replace(/<[^>]+>/g, "");
                var $temp = $('<div>').html(html);
                result = $temp.text();
                result = result.trim();
            }

            removeHTMLSafely($tempContainer);
            return result;
        } catch (e) {
            return "";
        }
    }

    // 发现页书籍列表函数
    async function find(url, page) {
        try {
            // APP传入的URL包含{{page}}占位符,需要替换为实际页码
            if (url.includes('{{page}}')) {
                url = url.replace('{{page}}', page);
            }

            var get = await http.Get(url, JSON.stringify(header), true);
            var $tempContainer = parseHTMLSafely(removeHTMLTags(get.data));
            var books = [];

            // 发现页使用ul/li结构,不是table
            var $rows = $tempContainer.find(".rec_rullist ul");

            $rows.each(function () {
                var $row = $(this);

                // li.two 包含书名和链接
                var $titleLink = $row.find("li.two a").first();
                if ($titleLink.length === 0) return;

                var name = $titleLink.text().trim();
                var bookUrl = $titleLink.attr('href');

                if (!name || !bookUrl) return;
                if (!bookUrl.startsWith('http')) {
                    bookUrl = baseurl + bookUrl;
                }

                // li.four 包含作者
                var author = $row.find("li.four").text().trim();

                // li.sev 包含分类
                var kind = $row.find("li.sev").text().trim();

                // li.three 包含最新章节
                var latestChapter = $row.find("li.three").text().trim();

                books.push({
                    "bookUrl": bookUrl,
                    "name": name,
                    "author": author,
                    "kind": kind,
                    "coverUrl": "",
                    "intro": "",
                    "tocUrl": bookUrl,
                    "wordCount": "",
                    "type": 0,
                    "latestChapterTitle": latestChapter
                });
            });

            removeHTMLSafely($tempContainer);
            return JSON.stringify(books);
        } catch (e) {
            return "[]";
        }
    }

    // 登录相关函数
    async function getloginurl() {
        try {
            // 检查 Cookie,有 Cookie 返回首页,无 Cookie 返回登录页
            var cookies = await cookie.get(baseurl);

            if (cookies && cookies.length > 50) {
                return baseurl;  // 已登录,返回首页
            }

            return "https://xn--vcsx64d.als1009.space/user/user/login.html";  // 未登录,返回登录页
        } catch (e) {
            return "https://xn--vcsx64d.als1009.space/user/user/login.html";
        }
    }

    async function login() {
        // webview登录完成后调用,验证登录状态
        try {
            var homeGet = await http.Get(baseurl, JSON.stringify(header), true);

            // 检查页面中是否包含登录成功的标志
            if (homeGet.data.includes("退出登录") ||
                homeGet.data.includes("个人中心") ||
                homeGet.data.includes("user/user/logout")) {

                // 登录成功,保存到缓存
                await cache.set("alicesw_login_status", "true");
                await cache.set("alicesw_login_time", Date.now().toString());

                return true;
            }

            return false;
        } catch (e) {
            return false;
        }
    }

    async function checklogin() {
        try {
            // 优先检查缓存
            var loginStatus = await cache.get("alicesw_login_status");
            if (loginStatus === "true") {
                return true;
            }

            // 检查 Cookie
            var cookies = await cookie.get(baseurl);
            if (cookies && cookies.length > 50) {
                // 有 Cookie,保存到缓存
                await cache.set("alicesw_login_status", "true");
                await cache.set("alicesw_login_time", Date.now().toString());
                return true;
            }

            return false;
        } catch (e) {
            return false;
        }
    }
